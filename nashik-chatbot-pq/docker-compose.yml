version: '3.8'

services:
  # PostgreSQL Database (Alpine 17)
  postgres:
    image: postgres:17-alpine
    container_name: traceability-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatbot
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traceability-network
    restart: unless-stopped

  # Neo4j Graph Database (2025.12.1 optimized for 32GB RAM Ubuntu VM)
  neo4j:
    image: neo4j:2025.12.1
    container_name: traceability-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      # Memory configuration optimized for 32GB RAM system
      # Page cache: 18GB - for caching graph data and indexes
      NEO4J_server_memory_pagecache_size: 18G
      # Heap: 10-12GB - for transaction processing and query execution
      NEO4J_server_memory_heap_initial__size: 10G
      NEO4J_server_memory_heap_max__size: 12G
      # APOC Plugin configuration
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - traceability-network
    restart: unless-stopped

  # Application (FastAPI + React)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traceability-app
    environment:
      # Azure OpenAI (Set these in .env file)
      AZURE_API_KEY: ${AZURE_API_KEY}
      AZURE_CHAT_ENDPOINT: ${AZURE_CHAT_ENDPOINT}
      AZURE_EMBEDDING_ENDPOINT: ${AZURE_EMBEDDING_ENDPOINT}
      AZURE_GPT5_ENDPOINT: ${AZURE_GPT5_ENDPOINT:-}

      # Neo4j Configuration
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password

      # PostgreSQL Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatbot

      # Application Settings
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: "true"
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./app/config/.env:/app/app/config/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:5000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - traceability-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: traceability-nginx
    ports:
      - "7434:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - traceability-network
    restart: unless-stopped

networks:
  traceability-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
